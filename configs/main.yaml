defaults:
  - _self_
  - model: parseq
  - charset: 94_full
  - dataset: real

model:
  _convert_: all
  img_size: [ 32, 128 ]  # [ height, width ]
  max_label_length: 25
  charset_train: ???
  charset_test: "0123456789abcdefghijklmnopqrstuvwxyz"
  batch_size: 768
  weight_decay: 0.0
  warmup_pct: 0.075

data:
  _target_: strhub.data.module.SceneTextDataModule
  root_dir: ~/data/STR/parseq/english/lmdb
  train_dir: ???
  batch_size: ${model.batch_size}
  img_size: ${model.img_size}
  charset_train: ${model.charset_train}
  charset_test: ${model.charset_test}
  max_label_length: ${model.max_label_length}
  remove_whitespace: true
  normalize_unicode: true
  augment: true
  num_workers: 2

trainer:
  _target_: pytorch_lightning.Trainer
  _convert_: all
  val_check_interval: 1000
  max_epochs: 20
  gradient_clip_val: 20
  accelerator: gpu
  devices: 1

ckpt_path: null

# DDSTR-specific config
mode: baseline  # baseline | CCD | CLD | CLD_CCD
pl_root_dir: null        # LMDB root for PL data (auto: data.root_dir/decomposed)
unicode_mapping: null    # Path to unicode_mapping.json (for CCD, CLD_CCD)

wandb:
  project: DDSTR
  group: base-group
  name: base-name

hydra:
  output_subdir: config
  run:
    dir: outputs/${wandb.group}/${wandb.name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${wandb.group}/${wandb.name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.override_dirname}
